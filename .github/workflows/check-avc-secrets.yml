name: Check AVC deployment secrets

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_PORT AVC_BASE_URL AVC_PRODUCTION_ENV_B64 AVC_OPS_READONLY_KEY; do
            value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "::error::Missing secret: ${key}"
              missing=1
            else
              echo "Secret ${key}: present"
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          AVC_BASE_URL: ${{ secrets.AVC_BASE_URL }}
          AVC_PRODUCTION_ENV_B64: ${{ secrets.AVC_PRODUCTION_ENV_B64 }}
          AVC_OPS_READONLY_KEY: ${{ secrets.AVC_OPS_READONLY_KEY }}

      - name: Validate production env secret
        run: |
          printf '%s' "${AVC_PRODUCTION_ENV_B64}" | base64 --decode > /tmp/avc.env
          for key in AVC_BASE_URL AVC_DB_HOST AVC_DB_NAME AVC_DB_USER AVC_DB_PASSWORD AVC_MAIL_TRANSPORT AVC_OPS_READONLY_KEY; do
            if ! grep -q "^${key}=" /tmp/avc.env; then
              echo "::error::Decoded production env is missing ${key}"
              exit 1
            fi
          done
          echo "Production env secret decodes correctly and contains required keys."
        env:
          AVC_PRODUCTION_ENV_B64: ${{ secrets.AVC_PRODUCTION_ENV_B64 }}

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Test FTP connection
        run: |
          lftp -e "
          set ftp:ssl-allow true;
          set ssl:verify-certificate no;
          set net:timeout 20;
          set net:max-retries 1;
          open -p ${FTP_PORT} -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
          pwd;
          cls -1 /public_html/index.php;
          bye
          "
          echo "FTP connection works and /public_html is reachable."
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
