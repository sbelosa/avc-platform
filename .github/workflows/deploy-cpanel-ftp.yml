name: Deploy AVC to cPanel

on:
  push:
    branches:
      - main
    paths:
      - 'platform/**'
      - 'deploy/public_html/**'
      - '.github/workflows/deploy-cpanel-ftp.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy-config
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          if [ -n "${FTP_SERVER}" ] && [ -n "${FTP_USERNAME}" ] && [ -n "${FTP_PASSWORD}" ] && [ -n "${FTP_PORT}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write production env from secret
        if: steps.deploy-config.outputs.configured == 'true'
        env:
          AVC_PRODUCTION_ENV_B64: ${{ secrets.AVC_PRODUCTION_ENV_B64 }}
        run: |
          if [ -n "${AVC_PRODUCTION_ENV_B64}" ]; then
            printf '%s' "${AVC_PRODUCTION_ENV_B64}" | base64 --decode > platform/.env.production
            chmod 600 platform/.env.production
          else
            echo "::warning::AVC_PRODUCTION_ENV_B64 is not configured. Existing server .env.production will be preserved if present."
          fi

      - name: Lint PHP files
        run: |
          docker run --rm -v "$PWD/platform:/var/www/html" -w /var/www/html php:8.3-cli \
            sh -lc 'find . -type f -name "*.php" -not -path "./storage/*" -print0 | xargs -0 -n1 php -l'

      - name: Skip deploy when FTP secrets are missing
        if: steps.deploy-config.outputs.configured != 'true'
        run: echo "FTP secrets are not configured yet, so deployment was skipped."

      - name: Install FTP client
        if: steps.deploy-config.outputs.configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy files to cPanel
        if: steps.deploy-config.outputs.configured == 'true'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          lftp <<EOF
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          open -p ${FTP_PORT} -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER}
          mkdir -p /avc-platform
          mirror --reverse --verbose --only-newer --parallel=2 \
            --exclude-glob .DS_Store \
            --exclude-glob .git* \
            --exclude-glob storage/backups/** \
            --exclude-glob storage/cache/** \
            --exclude-glob storage/imports/** \
            --exclude-glob storage/logs/** \
            --exclude-glob storage/reports/** \
            --exclude-glob public/wp-content/uploads/** \
            platform /avc-platform
          mkdir -p /public_html
          mirror --reverse --verbose --only-newer --parallel=2 \
            --exclude-glob .DS_Store \
            --exclude-glob .git* \
            deploy/public_html /public_html
          mkdir -p /public_html/media
          mirror --reverse --verbose --only-newer --parallel=2 \
            --exclude-glob .DS_Store \
            --exclude-glob .git* \
            platform/public/media /public_html/media
          bye
          EOF
